<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo negro -->
  <rect width="512" height="512" fill="#000000"/>
  <!-- Cuadrado naranja con bordes muy redondeados (squircle) -->
  <rect x="56" y="56" width="400" height="400" rx="100" fill="#FF6B35"/>
  <!-- X blanca centrada con líneas gruesas y extremos rectos -->
  <g stroke="#FFFFFF" stroke-width="50" stroke-linecap="butt">
    <line x1="156" y1="156" x2="356" y2="356"/>
    <line x1="356" y1="156" x2="156" y2="356"/>
  </g>
</svg>
