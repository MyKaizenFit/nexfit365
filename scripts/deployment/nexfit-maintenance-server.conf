    # NexFit maintenance page.
    # Include this block inside the HTTPS frontend server block, before location /.
    error_page 503 @nexfit_maintenance;

    location = /maintenance.html {
        root /srv/mykaizenfit/pro/data;
        try_files /maintenance/index.html =503;
        add_header Cache-Control "no-store" always;
    }

    location @nexfit_maintenance {
        root /srv/mykaizenfit/pro/data;
        rewrite ^ /maintenance/index.html break;
        add_header Cache-Control "no-store" always;
        add_header Retry-After 2400 always;
    }
