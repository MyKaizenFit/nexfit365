# Docker Compose para DESARROLLO - MyKaizenFit
# ⚠️ IMPORTANTE: Este archivo está optimizado para desarrollo
# Usa: COMPOSE_PROJECT_NAME=nexfit-pro docker compose -f docker-compose.dev.yml up -d
# 
# PUERTOS DE DESARROLLO (diferentes a producción):
# - DB: 5434 (producción usa 5433)
# - Backend: 8001 (producción usa 8000)
# - Frontend: 3001 (producción usa 3000)
# - Redis: 6380 (producción no expone puerto)

services:
  # ============================================
  # BASE DE DATOS POSTGRES (DESARROLLO)
  # ============================================
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: mykaizenfit_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "0.0.0.0:5434:5432"  # Puerto diferente a producción (5433), expuesto en todas las interfaces
    volumes:
      - /srv/mykaizenfit/pro/data/postgres:/var/lib/postgresql/data
      - /srv:/srv:ro  # Acceso de solo lectura a todo /srv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================================
  # REDIS (Cache y Colas) - DESARROLLO
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:6380:6379"  # Puerto diferente para desarrollo, expuesto en todas las interfaces
    volumes:
      - /srv/mykaizenfit/pro/data/redis:/data
      - /srv:/srv:ro  # Acceso de solo lectura a todo /srv
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================================
  # BACKEND (Django) - DESARROLLO
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    
    # Ejecutar como root para evitar problemas de permisos en /app/staticfiles
    user: "0:0"
    
    env_file:
      - ./docker/backend.env  # Archivo de desarrollo
    # En desarrollo, usar runserver con auto-reload
    command: >
      /bin/sh -c "
      echo 'Aplicando migraciones...' &&
      python manage.py migrate --noinput &&
      echo 'Recolectando archivos estáticos...' &&
      python manage.py collectstatic --noinput &&
      echo 'Iniciando servidor de desarrollo...' &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "0.0.0.0:8001:8000"  # Puerto diferente a producción (8000), expuesto en todas las interfaces
    # ⚠️ IMPORTANTE: Volúmenes montados para desarrollo
    # Los cambios en el código se reflejan automáticamente sin reconstruir
    volumes:
      - ./backend:/app  # Montar todo el código del backend
      - /srv/mykaizenfit/pro/data/staticfiles:/app/staticfiles  # Archivos estáticos en /srv
      - /srv/mykaizenfit/pro/data/media:/app/media  # Archivos de media en /srv
      - /srv:/srv:rw  # Acceso completo de lectura/escritura a todo /srv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - internal
      - web

  # ============================================
  # FRONTEND (Next.js) - DESARROLLO
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps  # Usar solo la etapa de dependencias para desarrollo
    restart: unless-stopped
    env_file:
      - ./frontend/docker.env  # Archivo de desarrollo
    # Comando para desarrollo: usar npm run dev con hot-reload (ya escucha en 0.0.0.0 por defecto)
    command: sh -c "npm ci --legacy-peer-deps && npm run dev"
    ports:
      - "0.0.0.0:3001:3000"  # Puerto diferente a producción (3000), expuesto en todas las interfaces
    # ⚠️ IMPORTANTE: Volúmenes montados para desarrollo
    # Los cambios en el código se reflejan automáticamente con hot-reload
    volumes:
      - ./frontend:/app  # Montar todo el código del frontend
      - frontend_node_modules:/app/node_modules  # Volumen separado para node_modules
      - /srv:/srv:ro  # Acceso de solo lectura a todo /srv
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - web

# ============================================
# VOLÚMENES PERSISTENTES (DESARROLLO)
# ============================================
# NOTA: Los datos ahora se guardan directamente en /srv/mykaizenfit/pro/data/
# Esto permite acceso directo desde el host y mejor persistencia.
# frontend_node_modules se mantiene como volumen nombrado para mejor rendimiento en desarrollo
volumes:
  frontend_node_modules:
    driver: local
# Los siguientes volúmenes ahora usan bind mounts en /srv:
# - postgres_data_dev -> /srv/mykaizenfit/pro/data/postgres
# - backend_static_dev -> /srv/mykaizenfit/pro/data/staticfiles
# - backend_media_dev -> /srv/mykaizenfit/pro/data/media

# ============================================
# REDES
# ============================================
networks:
  internal:
    driver: bridge
    internal: true  # Red privada: solo comunicación entre servicios Docker
  web:
    driver: bridge
