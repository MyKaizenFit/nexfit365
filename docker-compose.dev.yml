# ============================================
# Docker Compose para DESARROLLO - NexFit365
# ============================================
# 📁 Carpeta: /srv/mykaizenfit/pro/
# 
# ⚠️ ESTE ARCHIVO ES PARA DESARROLLO, NO PRODUCCIÓN
# 
# COMANDOS:
#   Iniciar:  COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml up -d
#   Detener:  COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml down
#   Logs:     COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml logs -f
#   Build:    COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml up -d --build
#
# PUERTOS DE DESARROLLO (diferentes a producción):
#   - Frontend: 3001 (prod: 3000)
#   - Backend:  8001 (prod: 8000)
#   - DB:       5434 (prod: 5433)
#
# BASE DE DATOS SEPARADA:
#   - Nombre: mykaizenfit_dev (prod: mykaizenfit)
#   - Datos en: /srv/mykaizenfit/pro/data-dev/

services:
  # ============================================
  # BASE DE DATOS POSTGRES (DESARROLLO)
  # ============================================
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: mykaizenfit_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "0.0.0.0:5434:5432"
    volumes:
      - /srv/mykaizenfit/pro/data-dev/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================================
  # REDIS (DESARROLLO)
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Sin password en desarrollo para simplicidad
    volumes:
      - /srv/mykaizenfit/pro/data-dev/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================================
  # BACKEND (Django) - DESARROLLO
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    environment:
      # Django
      DEBUG: "True"
      SECRET_KEY: dev-secret-key-not-for-production
      ALLOWED_HOSTS: "*"
      # Base de datos
      DB_NAME: mykaizenfit_dev
      DB_USER: postgres
      DB_PASSWORD: dev_password_123
      DB_HOST: db
      DB_PORT: "5432"
      # Redis (sin password en dev)
      REDIS_URL: redis://redis:6379/0
      # CORS
      CORS_ALLOWED_ORIGINS: "http://localhost:3001,http://127.0.0.1:3001"
      CORS_ALLOW_CREDENTIALS: "True"
      CSRF_TRUSTED_ORIGINS: "http://localhost:3001,http://127.0.0.1:3001"
      # Logs
      LOG_LEVEL: DEBUG
    command: >
      sh -c "
        echo '🔄 Aplicando migraciones...' &&
        python manage.py migrate --noinput &&
        echo '📦 Recolectando archivos estáticos...' &&
        python manage.py collectstatic --noinput &&
        echo '🚀 Iniciando servidor de desarrollo...' &&
        python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "0.0.0.0:8001:8000"
    volumes:
      - ./backend:/app
      # Volúmenes nombrados para Windows (más rápido que bind mounts a rutas Linux)
      - nexfit-dev-staticfiles:/app/staticfiles
      - nexfit-dev-media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal
      - web

  # ============================================
  # FRONTEND (Next.js) - DESARROLLO
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8001/api
      NEXT_PUBLIC_APP_NAME: NexFit365-DEV
      NEXT_PUBLIC_DEBUG: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "0.0.0.0:3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - web

# ============================================
# VOLÚMENES
# ============================================
volumes:
  nexfit-dev-staticfiles:
    name: nexfit-dev-staticfiles
  nexfit-dev-media:
    name: nexfit-dev-media

# ============================================
# REDES
# ============================================
# Nombres únicos para evitar conflictos con producción
networks:
  internal:
    name: nexfit-dev-internal
    driver: bridge
    internal: true
  web:
    name: nexfit-dev-web
    driver: bridge
