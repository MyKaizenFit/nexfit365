# ============================================
# Docker Compose para DESARROLLO - NexFit365
# ============================================
# 📁 Carpeta: /srv/mykaizenfit/pro/
# 
# ⚠️ ESTE ARCHIVO ES PARA DESARROLLO, NO PRODUCCIÓN
# 
# COMANDOS:
#   Iniciar:  COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml up -d
#   Detener:  COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml down
#   Logs:     COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml logs -f
#   Build:    COMPOSE_PROJECT_NAME=nexfit-dev docker compose -f docker-compose.dev.yml up -d --build
#
# PUERTOS DE DESARROLLO (alineados con producción):
#   - Frontend: 3000 (prod: 3000)
#   - Backend:  8000 (prod: 8000)
#   - DB:       5434 (prod: 5433)
#
# BASE DE DATOS SEPARADA:
#   - Nombre: mykaizenfit_dev (prod: mykaizenfit)
#   - Datos en volúmenes nombrados de Docker (compatible Windows/Linux)

services:
  # ============================================
  # BASE DE DATOS POSTGRES (DESARROLLO)
  # ============================================
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - ./docker/backend.env.dev
    environment:
      # Configuración de encoding UTF-8
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
      PGCLIENTENCODING: "UTF8"
    ports:
      - "0.0.0.0:5434:5432"
    volumes:
      - nexfit-dev-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      internal:
        aliases:
          - nexfit-dev-db

  # ============================================
  # REDIS (DESARROLLO)
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    # Sin password en desarrollo para simplicidad
    volumes:
      - nexfit-dev-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      internal:
        aliases:
          - nexfit-dev-redis

  # ============================================
  # BACKEND (Django) - DESARROLLO
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./docker/backend.env.dev
    environment:
      # Logs
      LOG_LEVEL: DEBUG
    command: >
      sh -c "
        echo '🔄 Aplicando migraciones...' &&
          (python manage.py migrate --noinput || echo 'Migración completada con errores') &&
        echo '📦 Recolectando archivos estáticos...' &&
        python manage.py collectstatic --noinput || true &&
        echo '🚀 Iniciando servidor de desarrollo...' &&
        python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend:/app
      # Volúmenes nombrados para Windows (más rápido que bind mounts a rutas Linux)
      - nexfit-dev-staticfiles:/app/staticfiles
      - nexfit-dev-media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - internal
      - web

  # ============================================
  # FRONTEND (Next.js) - DESARROLLO
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./frontend/docker.env.dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEfqnWlIIIdFQjZ0aZ07qt8WYXMlA57a2V4MnBfrg4aKpinObCXZ3VTuyMnK6Sldzwo5dcuyGhd499/MfPwEqRcw"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - web

  # ============================================
  # CELERY WORKER - DESARROLLO
  # ============================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ./docker/backend.env.dev
    environment:
      LOG_LEVEL: DEBUG
    command: >
      sh -c "celery -A backend worker --loglevel=info --concurrency=2"
    volumes:
      - ./backend:/app
      - nexfit-dev-media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

# ============================================
# VOLÚMENES
# ============================================
volumes:
  nexfit-dev-postgres:
    name: nexfit-dev-postgres
  nexfit-dev-redis:
    name: nexfit-dev-redis
  nexfit-dev-staticfiles:
    name: nexfit-dev-staticfiles
  nexfit-dev-media:
    name: nexfit-dev-media

# ============================================
# REDES
# ============================================
# Nombres únicos para evitar conflictos con producción
networks:
  internal:
    name: nexfit-dev-internal
    driver: bridge
    internal: true
  web:
    name: nexfit-dev-web
    driver: bridge
