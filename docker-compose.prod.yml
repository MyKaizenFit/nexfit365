# ============================================
# Docker Compose para PRODUCCIÓN - Nex-Fit PRO
# ============================================
# 📁 Carpeta: /srv/mykaizenfit/pro/
# 
# ⚠️ IMPORTANTE: Usar SIEMPRE con COMPOSE_PROJECT_NAME para volúmenes estables
# 
# COMANDOS:
#   Iniciar:  COMPOSE_PROJECT_NAME=nexfit-pro docker compose -f docker-compose.prod.yml up -d
#   Detener:  COMPOSE_PROJECT_NAME=nexfit-pro docker compose -f docker-compose.prod.yml down
#   Logs:     COMPOSE_PROJECT_NAME=nexfit-pro docker compose -f docker-compose.prod.yml logs -f
#   Estado:   COMPOSE_PROJECT_NAME=nexfit-pro docker compose -f docker-compose.prod.yml ps
#   Build:    COMPOSE_PROJECT_NAME=nexfit-pro docker compose -f docker-compose.prod.yml build --no-cache
#
# PUERTOS DE PRODUCCIÓN:
#   - Frontend: 3000
#   - Backend:  8000
#   - DB:       5433 (para acceso externo si es necesario)
#   - Redis:    NO expuesto (solo interno)
#
# DATOS PERSISTENTES:
#   Todos los datos se guardan en /srv/mykaizenfit/pro/data/
#   - postgres/    -> Base de datos PostgreSQL
#   - redis/       -> Cache Redis
#   - staticfiles/ -> Archivos estáticos Django
#   - media/       -> Archivos subidos por usuarios
#   - backups/     -> Backups automáticos de la BD

services:
  # ============================================
  # BASE DE DATOS POSTGRES (PRODUCCIÓN)
  # ============================================
  db:
    image: postgres:15
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.75
    pids_limit: 200
    env_file:
      - ./docker/postgres.env.production
    environment:
      # Configuración de encoding UTF-8
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
      LC_ALL: "C.UTF-8"
      LANG: "C.UTF-8"
      PGCLIENTENCODING: "UTF8"
    ports:
      - "127.0.0.1:5433:5432"  # Solo acceso local (VS Code DB viewer)
    # PostgreSQL queda solo en la red interna de Docker.
    # Para mantenimiento puntual, usa `docker compose exec db psql`.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - /srv/mykaizenfit/pro/data/postgres:/var/lib/postgresql/data
      - /srv:/srv:ro  # Acceso de solo lectura a /srv
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      internal:
        aliases:
          - nexfit-pro-db

  # ============================================
  # REDIS (Cache y Colas) - PRODUCCIÓN
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 150
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    # Redis NO expone puerto externamente por seguridad
    volumes:
      - /srv/mykaizenfit/pro/data/redis:/data
      - /srv:/srv:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      internal:
        aliases:
          - nexfit-pro-redis

  # ============================================
  # BACKEND (Django + Gunicorn) - PRODUCCIÓN
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1001:1001"
    mem_limit: 1g
    cpus: 0.75
    pids_limit: 300
    env_file:
      - ./docker/backend.env.production
    environment:
      DB_HOST: nexfit-pro-db
      REDIS_URL: redis://nexfit-pro-redis:6379/0
      READ_DOTENV: "False"
    command: >
      sh -c "
        echo '� Aplicando migraciones...' &&
        python manage.py migrate --noinput &&
        echo '�📦 Recolectando archivos estáticos...' &&
        python manage.py collectstatic --noinput &&
        echo '🚀 Iniciando Gunicorn...' &&
        gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 300 --worker-class gthread --max-requests 800 --max-requests-jitter 50 --access-logfile - --error-logfile - --log-level info
      "
    ports:
      - "127.0.0.1:8000:8000"  # Expuesto solo al host/reverse proxy
    volumes:
      - ./backend:/app  # Código del backend
      - /srv/mykaizenfit/pro/data/staticfiles:/app/staticfiles
      - /srv/mykaizenfit/pro/data/media:/app/media
      - /srv/mykaizenfit/pro/data/backups:/app/backups
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - internal
      - web

  # ============================================
  # FRONTEND (Next.js) - PRODUCCIÓN
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
        - BUILDKIT_INLINE_CACHE=1
      shm_size: '256m'  # Limitar memoria compartida durante el build
    restart: unless-stopped
    mem_limit: 768m
    cpus: 0.5
    pids_limit: 200
    env_file:
      - ./frontend/docker.env.production
    ports:
      - "127.0.0.1:3000:3000"  # Expuesto solo al host/reverse proxy
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - web

  # ============================================
  # BACKUPS AUTOMÁTICOS DE LA BD
  # ============================================
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.2
    pids_limit: 150
    env_file:
      - ./docker/postgres.env.production
    environment:
      TZ: "Europe/Madrid"
      POSTGRES_HOST: nexfit-pro-db
      # Backup completo (sin limitar a schema=public)
      POSTGRES_EXTRA_OPTS: --encoding=UTF8
      PGCLIENTENCODING: UTF8
      SCHEDULE: "0 3 * * *"  # Diario a las 3 AM
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - /srv/mykaizenfit/pro/data/backups:/backups
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

  # ============================================
  # CELERY WORKER - PRODUCCIÓN
  # ============================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    user: "1001:1001"
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 200
    env_file:
      - ./docker/backend.env.production
    environment:
      DB_HOST: nexfit-pro-db
      REDIS_URL: redis://nexfit-pro-redis:6379/0
      READ_DOTENV: "False"
    command: >
      sh -c "celery -A backend worker --loglevel=info --concurrency=2"
    volumes:
      - ./backend:/app
      - /srv/mykaizenfit/pro/data/media:/app/media
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - web  # Necesario para acceso SMTP (smtp.gmail.com, Brevo, etc.)

# ============================================
# VOLÚMENES
# ============================================
# NOTA: No se usan volúmenes nombrados.
# Todos los datos están en bind mounts a /srv/mykaizenfit/pro/data/
# Esto permite:
#   - Acceso directo desde el host
#   - Fácil backup/restauración
#   - Persistencia independiente de Docker

# ============================================
# REDES
# ============================================
# Nombres únicos para evitar conflictos con desarrollo
networks:
  internal:
    # IMPORTANTE: nombre único para evitar colisiones de alias DNS (db/redis) con otros stacks
    # Si varios proyectos comparten la misma red, Docker DNS puede resolver "db" a otro contenedor.
    name: nexfit-pro-internal-prod
    driver: bridge
    internal: true  # Red privada: solo comunicación entre servicios Docker
  web:
    # Nombre único para evitar colisiones con otros despliegues
    name: nexfit-pro-web-prod
    driver: bridge
