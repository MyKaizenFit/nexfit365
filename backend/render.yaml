services:
  - type: web
    name: mykaizenfit-backend
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements-prod.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py populate_exercises_simple
      python manage.py populate_workout_templates
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: backend.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: mykaizenfit-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mykaizenfit.vercel.app,https://mykaizenfit.com
      - key: CORS_ALLOW_CREDENTIALS
        value: True
      - key: DATABASE_URL
        fromDatabase:
          name: mykaizenfit-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mykaizenfit-redis
          property: connectionString
      - key: STATIC_URL
        value: /static/
      - key: STATIC_ROOT
        value: /opt/render/project/src/staticfiles/
      - key: MEDIA_URL
        value: /media/
      - key: MEDIA_ROOT
        value: /opt/render/project/src/media/

  - type: redis
    name: mykaizenfit-redis
    plan: free

  - type: pserv
    name: mykaizenfit-db
    plan: free
    databaseName: mykaizenfit
    user: mykaizenfit_user
