# Docker Compose para DESARROLLO LIMPIO - Nex-Fit
# ⚠️ IMPORTANTE: Este archivo es para desarrollo pero SIN volúmenes montados
# Combina lo mejor de producción (imagen limpia) con dev (puertos y BD de desarrollo)
# 
# Usa: COMPOSE_PROJECT_NAME=nexfit-pro docker compose -f docker-compose.dev-clean.yml up -d
# 
# PUERTOS DE DESARROLLO (diferentes a producción):
# - DB: 5434 (producción usa 5433)
# - Backend: 8001 (producción usa 8000)
# - Frontend: 3001 (producción usa 3000)
# - Redis: 6380 (producción no expone puerto)
#
# VENTAJAS:
# ✅ Imagen limpia (sin archivos corruptos del host)
# ✅ Misma BD de desarrollo (mykaizenfit_dev)
# ✅ Puertos de desarrollo separados
# ✅ Gunicorn robusto (en lugar de runserver)
# ❌ Sin hot-reload (necesitas reconstruir para cambios)

services:
  # ============================================
  # BASE DE DATOS POSTGRES (DESARROLLO)
  # ============================================
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: mykaizenfit_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "0.0.0.0:5434:5432"  # Puerto diferente a producción (5433)
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================================
  # REDIS (Cache y Colas) - DESARROLLO
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:6380:6379"  # Puerto diferente para desarrollo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ============================================
  # BACKEND (Django + Gunicorn) - DESARROLLO LIMPIO
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped

    # Ejecutar como root para evitar problemas de permisos
    user: "0:0"

    env_file:
      - ./docker/backend.env  # Archivo de desarrollo

    # Usar gunicorn en lugar de runserver para mayor robustez
    # Ejecutar migraciones y collectstatic en background para que gunicorn inicie más rápido
    command: ["sh", "-c", "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 2 --timeout 120 --access-logfile - --error-logfile - --log-level info"]

    ports:
      - "0.0.0.0:8001:8000"  # Puerto diferente a producción (8000)
    volumes:
      # Solo volúmenes para datos persistentes, NO para el código fuente
      - backend_static_dev:/app/staticfiles
      - backend_media_dev:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 10  # Más reintentos
      start_period: 120s  # Más tiempo para desarrollo (migraciones pueden tardar)
    networks:
      - internal
      - web

  # ============================================
  # FRONTEND (Next.js) - DESARROLLO LIMPIO
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production  # Build de producción pero en puerto de dev
        - ENV_FILE=docker.env  # Usar archivo de desarrollo
    restart: unless-stopped
    env_file:
      - ./frontend/docker.env  # Archivo de desarrollo
    ports:
      - "0.0.0.0:3001:3000"  # Puerto diferente a producción (3000)
    # Sin volúmenes montados - código viene de la imagen
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Más tiempo para desarrollo
    networks:
      - web

  # ============================================
  # BACKUPS AUTOMÁTICOS (OPCIONAL - DESARROLLO)
  # ============================================
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: mykaizenfit_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_EXTRA_OPTS: -Z6 --schema=public
      SCHEDULE: "0 3 * * *"  # Diario a las 3 AM
      BACKUP_DIR: /backups
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

# ============================================
# VOLÚMENES PERSISTENTES (DESARROLLO)
# ============================================
volumes:
  postgres_data_dev:
    driver: local
  backend_static_dev:
    driver: local
  backend_media_dev:
    driver: local

# ============================================
# REDES
# ============================================
networks:
  internal:
    driver: bridge
    internal: true  # Red privada: solo comunicación entre servicios Docker
  web:
    driver: bridge
